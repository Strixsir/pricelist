    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-dark: #050505;
            --card-bg: #0a0a0a;
            --border-color: #222;
            --accent-red: #d32f2f;
            --text-muted: #888;
            
            --val-red: #ff3333;
            --val-green: #4ade80;
            --val-yellow: #facc15;
            --val-purple: #e879f9;
        }

        body {
            background-color: var(--bg-dark);
            color: #eee;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .input-box {
            background: #000;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
            color: #fff;
        }

        .input-box:focus {
            border-color: var(--accent-red);
            outline: none;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 1.25rem 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90px;
            position: relative;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.5rem;
            text-align: center;
        }

        .sub-stat {
            font-size: 0.6rem;
            color: #666;
            margin-top: 0.25rem;
            text-align: center;
        }

        .val-red { color: var(--val-red); }
        .val-green { color: var(--val-green); }
        .val-yellow { color: var(--val-yellow); }
        .val-purple { color: var(--val-purple); }

        .btn-active {
            background-color: rgba(139, 0, 0, 0.4);
            border: 1px solid #ff5555;
            color: #fff;
        }

        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--accent-red);
            color: #fff;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background: rgba(139, 0, 0, 0.2);
        }

        .yield-card {
            background: linear-gradient(180deg, #1a0505 0%, #050505 100%);
            border: 1px solid var(--accent-red);
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-color: #0a0a0a;
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem !important;
        }

        input[type="checkbox"] {
            accent-color: var(--accent-red);
        }
        
        input[type=range] {
            accent-color: var(--accent-red);
        }

        .tooltip-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 14px; height: 14px; border-radius: 50%;
            background: #333; color: #aaa; font-size: 9px; font-weight: bold;
            margin-left: 6px; cursor: help; transition: background 0.2s;
        }
        .has-tooltip:hover .tooltip-icon { background: #666; color: #fff; }
        .has-tooltip { position: relative; display: inline-flex; align-items: center; }
        .tooltip-text {
            visibility: hidden; background-color: #222; color: #ddd;
            text-align: left; padding: 10px 14px; border-radius: 6px;
            position: absolute; z-index: 50; bottom: 130%; left: 50%; transform: translateX(-50%);
            opacity: 0; transition: opacity 0.2s; width: max-content; max-width: 250px;
            font-size: 11px; font-weight: normal; border: 1px solid #444; line-height: 1.4;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); pointer-events: none; text-transform: none; letter-spacing: normal;
        }
        .has-tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }

        #protocolModal {
            backdrop-filter: blur(5px);
        }
    </style>
</head>
